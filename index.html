<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Miraditas Studio — Panel</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<header class="header">
  <h1>Miraditas Studio</h1>
</header>

<main class="main">

<h2>Cierre del Día</h2>

<div class="card">
  <label>Empleada</label>
  <select id="sel-empleada"></select>

  <label>Servicio</label>
  <select id="sel-servicio"></select>

  <label>Cantidad</label>
  <input type="number" id="inp-cantidad" value="1"/>

  <button id="btn-agregar">Agregar</button>
</div>

<div class="card">
  <h3>Resumen</h3>
  <div id="day-items"></div>

  <div id="day-totals"></div>

  <h4>Pagos</h4>
  <input id="inp-efectivo" type="number" placeholder="Efectivo"/>
  <input id="inp-transfer" type="number" placeholder="Transferencia"/>

  <!-- NUEVO -->
  <h4>Gastos del día</h4>
  <input id="inp-gastos" type="number" value="0"/>

  <button id="btn-cerrar">Cerrar día</button>
</div>

<div class="card">
  <h2>Historial</h2>
  <button id="btn-export-csv">Exportar CSV</button>
  <button id="btn-export-dia">Exportar último cierre</button>
  <table>
    <tbody id="hist-body"></tbody>
  </table>
</div>

</main>

<script src="app.js"></script>
</body>
</html>
